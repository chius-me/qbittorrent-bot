services:
  qbittorrent-bot:
    image: ghcr.io/chius-me/qbittorrent-bot:latest
    build: .
    container_name: qbittorrent-bot
    restart: unless-stopped
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - QBITTORRENT_URL=${QBITTORRENT_URL}
      - QBITTORRENT_USER=${QBITTORRENT_USER:-admin}
      - QBITTORRENT_PASS=${QBITTORRENT_PASS:-adminadmin}
      - ALLOWED_USERS=${ALLOWED_USERS:-}
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - NO_PROXY=${NO_PROXY:-localhost,127.0.0.1}
      - TZ=${TZ:-UTC}
      - STATE_FILE=/data/notify_state.json
    volumes:
      - qbittorrent-bot-data:/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pgrep qbittorrent-bot || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  qbittorrent-bot-data:
